name: DevSecOps Optimized Pipeline

on:
  pull_request: {branches: [master]}
  push: {branches: [master]}
  schedule:
    - cron: '0 3 * * 1'

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. GABUNGAN SCAN: Menjalankan semua cek secara bersamaan dalam satu job
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Otomatis caching node_modules
      - run: npm ci --ignore-scripts
      
      - name: Lint & Audit
        run: |
          npm run lint
          npm audit --audit-level=high
      
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
      
      - name: Snyk Scan
        uses: snyk/actions/node@9cf6ca713d71123d2d229cc3d7f145b96ea3c518
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # 2. CODEQL: Jalankan secara paralel dengan job di atas agar hemat waktu
  
  # 3. BUILD: Hanya jalan jika scan di atas berhasil
  build:
    needs: [quality-and-security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # CACHE NEXT.JS: Biar build tidak mulai dari nol
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - run: npm ci --ignore-scripts
      - run: npm run build
      
      # ARTIFACT: Simpan hasil build
      - uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next/