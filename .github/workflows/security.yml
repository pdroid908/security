name: DevSecOps Optimized Pipeline

on:
  pull_request: {branches: [master]}
  push: {branches: [master]}

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # JOB 1: Kualitas & Keamanan (Gabungan Linter, Audit, Snyk, Gitleaks)
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Mengaktifkan cache untuk node_modules
      
      - run: npm ci --ignore-scripts
      
      - name: Lint & Audit
        run: |
          npm run lint
          npm audit --audit-level=high

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@latest

      - name: Snyk Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  # JOB 2: CodeQL (Berjalan paralel dengan job 1)
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # JOB 3: Build & Upload (Hanya jalan jika JOB 1 & 2 sukses)
  build:
    needs: [quality-and-security, codeql]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Cache Next.js agar build tidak dari nol
      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm run build
      
      # Upload hasil build ke Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: .next/