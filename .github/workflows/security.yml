name: DevSecOps Optimized Pipeline

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  schedule:
    - cron: '0 3 * * 1'

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true


jobs:

# =========================
# 1. FAST SECURITY GATEd
# =========================
  security-fast:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - name: ESLint
        run: npm run lint

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7


# =========================
# 2. DEPENDENCY SCAN
# =========================
  dependency-scan:
    runs-on: ubuntu-latest
    needs: security-fast

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - name: NPM Audit
        run: npm audit --audit-level=high

      - name: Snyk Scan
        uses: snyk/actions/node@9cf6ca713d71123d2d229cc3d7f145b96ea3c518
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: OSV Scan
        run: |
          curl --proto =https -o osv-scanner https://github.com/google/osv-scanner/releases/latest/download/osv-scanner-linux-amd64
          chmod +x osv-scanner
          ./osv-scanner --lockfile=package-lock.json


# =========================
# 3. CODEQL (SLOW BUT POWERFUL)
# ONLY RUN ON PR MAIN
# =========================
  codeql:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: dependency-scan

    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3


# =========================
# 4. BUILD (ONLY IF ALL SAFE)
# =========================
  build:
    runs-on: ubuntu-latest
    needs: [dependency-scan, security-fast, codeql]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci --ignore-scripts

      - run: npm run build

      - run: du -sh .next

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next