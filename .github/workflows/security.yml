name: Enterprise DevSecOps Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 3 * * 1'

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # =========================
  # CODEQL (SAST)
  # =========================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3


  # =========================
  # QUALITY + BASIC SECURITY
  # =========================
  quality-security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: NPM Audit (basic)
        run: npm audit --audit-level=high

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2


  # =========================
  # SNYK SCAN (ADVANCED)
  # =========================
  snyk-scan:
    runs-on: ubuntu-latest
    needs: quality-security

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk Test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --severity-threshold=high


  # =========================
  # OSV SCAN (FREE OPEN SOURCE)
  # =========================
  osv-scan:
    runs-on: ubuntu-latest
    needs: quality-security

    steps:

      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install OSV Scanner
        run: |
          curl -L -o osv-scanner https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x osv-scanner

      - name: Run OSV Scan
        run: ./osv-scanner --lockfile=package-lock.json


  # =========================
  # BUILD
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: [quality-security, snyk-scan, osv-scan]

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build

      - name: Check Build Size
        run: du -sh .next

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next