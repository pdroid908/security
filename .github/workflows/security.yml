name: Enterprise DevSecOps Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: devsecops-${{ github.ref }}
  cancel-in-progress: true

jobs:

  quality-security:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # =========================
      # INSTALL (STRICT)
      # =========================
      - name: Install Dependencies
        run: npm ci

      # =========================
      # LINT (FAIL FAST)
      # =========================
      - name: Run ESLint
        run: npm run lint

      # =========================
      # SECURITY AUDIT (FAIL FAST)
      # =========================
      - name: Run NPM Audit
        run: npm audit --audit-level=high

      # =========================
      # SECRET SCAN
      # =========================
      - name: Run Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2


  build:
    runs-on: ubuntu-latest
    needs: quality-security

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # =========================
      # NODE SETUP
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # =========================
      # INSTALL (STRICT)
      # =========================
      - name: Install Dependencies
        run: npm ci

      # =========================
      # BUILD APP
      # =========================
      - name: Build Application
        run: npm run build

      # =========================
      # SIZE CHECK
      # =========================
      - name: Check Build Size
        run: du -sh .next

      # =========================
      # UPLOAD ARTIFACT
      # =========================
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next